name: Build Signed Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      # إنشاء مشروع Cordova جديد
      - name: Create new Cordova project
        run: |
          cordova create cordova-project com.percentagelab.app "مختبر النسبة المئوية"
          # نسخ جميع ملفات المستودع (HTML, JS, resources) إلى مجلد www
          cp -r * cordova-project/www/ 2>/dev/null || true
          # استخدام ملف config.xml الموجود (يجب أن يكون مبسطاً)
          cp config.xml cordova-project/config.xml

      - name: Add Android platform
        run: |
          cd cordova-project
          cordova platform add android --no-telemetry

      - name: Decode Keystore (clean)
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > cordova-project/percentage-lab.keystore

      - name: Build Release APK
        run: |
          cd cordova-project
          cordova build android --release -- --keystore=percentage-lab.keystore --storePassword=${{ secrets.KEYSTORE_PASSWORD }} --alias=${{ secrets.KEY_ALIAS }} --password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv cordova-project/platforms/android/app/build/outputs/apk/release/app-release.apk Percentage-Lab-signed.apk || mv cordova-project/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk Percentage-Lab-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-android-apk
          path: Percentage-Lab-signed.apk
