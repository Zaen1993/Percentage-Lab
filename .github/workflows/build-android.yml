name: Build Signed Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova project
        run: cordova create cordova-app com.percentagelab.app "مختبر النسبة المئوية"

      - name: Copy project files
        run: |
          cp -r * cordova-app/www/ 2>/dev/null || true
          cp config.xml cordova-app/config.xml

      - name: Add Android platform
        working-directory: ./cordova-app
        run: cordova platform add android --no-telemetry

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > cordova-app/percentage-lab.keystore

      - name: Build release APK
        working-directory: ./cordova-app
        run: |
          cordova build android --release -- \
            --keystore=percentage-lab.keystore \
            --storePassword=${{ secrets.KEYSTORE_PASSWORD }} \
            --alias=${{ secrets.KEY_ALIAS }} \
            --password=${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv cordova-app/platforms/android/app/build/outputs/apk/release/app-release.apk Percentage-Lab-signed.apk || \
          mv cordova-app/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk Percentage-Lab-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-android-apk
          path: Percentage-Lab-signed.apk
