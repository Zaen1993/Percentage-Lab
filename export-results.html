<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر النسبة المئوية</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            max-width: 500px;
        }
        h1 {
            color: #00ffcc;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid white;
        }
        button:hover {
            background: #00ccaa;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مختبر النسبة المئوية</h1>
        <p>هذا التطبيق لا يخزن أي نتائج أو بيانات على جهازك. كل التفاعلات تحدث بشكل مؤقت ولا يتم حفظ أي شيء.</p>
        <p>يمكنك استخدام التطبيق بحرية تامة دون قلق بشأن الخصوصية.</p>
        <button onclick="goHome()">العودة إلى الرئيسية</button>
    </div>

    <script>
        function goHome() {
            window.location.href = 'الرئيسية.html';
        }
    </script>
</body>
</html>
